repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: uv run black
        language: system
        require_serial: true
        types: [python]
        args: [--config=pyproject.toml]

      - id: isort
        name: isort
        entry: uv run isort
        language: system
        types: [python]
        args: [--settings-path=pyproject.toml]
        pass_filenames: false

      - id: flake8
        name: flake8
        entry: uv run flake8
        language: system
        types: [python]
        args: [--config=.dev-config/.flake8]
        pass_filenames: false

      - id: pydocstyle
        name: pydocstyle
        entry: uv run pydocstyle
        language: system
        types: [python]
        args: [--config=.dev-config/.pydocstyle]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        args: [--config-file=.dev-config/mypy.ini, .]
        pass_filenames: false

      - id: pylint
        name: pylint
        entry: uv run pylint
        language: system
        types: [python]
        args: [--rcfile=.dev-config/.pylintrc]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        always_run: true
        args: [tests/]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
