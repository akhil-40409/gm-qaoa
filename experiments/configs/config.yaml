# Example Hydra configuration file
# This file defines default parameters for experiments

# Model configuration
model:
  name: "example_model"
  hidden_size: 128
  num_layers: 3
  dropout: 0.1

# Data configuration
data:
  dataset: "example_dataset"
  batch_size: 32
  num_workers: 4
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# Training configuration
training:
  learning_rate: 0.001
  epochs: 100
  optimizer: "adam"
  weight_decay: 0.0001
  scheduler: "cosine"

# Experiment settings
experiment:
  seed: 42
  device: "cpu"  # Change to "cuda" if GPU is available
  log_interval: 10
  save_interval: 20
